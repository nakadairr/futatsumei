const STAT_DEFS = [
  { key:'atk', label:'攻撃力', colors:['#ff6b6b','#ff4444'] },
  { key:'def', label:'防御力', colors:['#4fc3f7','#0288d1'] },
  { key:'mag', label:'魔　力', colors:['#9b6dff','#6a3de8'] },
  { key:'spd', label:'速　さ', colors:['#80ffb0','#00c853'] },
  { key:'luk', label:'運　命', colors:['#f0c060','#d4a017'] },
];

// ── ハッシュ関数 ──────────────────────────────────────

function hash(str) {
  let h = 2166136261;
  for (let i = 0; i < str.length; i++) {
    h ^= str.charCodeAt(i);
    h = Math.imul(h, 16777619);
  }
  return Math.abs(h >>> 0);
}

function pick(arr, seed, offset) {
  return arr[(seed + offset * 7919) % arr.length];
}

// ── 生成ロジック ──────────────────────────────────────

function calcResult(name) {
  const h = hash(name);
  const futatsumei = pick(PREFIXES, h, 0) + 'の' + pick(TITLES, h, 1);
  const epithet    = pick(EPITHETS, h, 2);
  const type       = TYPES[(h + 3 * 7919) % TYPES.length];

  const stats = STAT_DEFS.map((s, i) => {
    const raw = hash(name + s.key);
    const val = (raw % 800) + 100; // 100〜899
    return { ...s, val };
  });

  return { name, futatsumei, epithet, type, stats };
}

// ── UI ───────────────────────────────────────────────

let currentResult = null;

function fillExample(text) {
  document.getElementById('name-input').value = text;
}

function generate() {
  const name = document.getElementById('name-input').value.trim();
  if (!name) {
    document.getElementById('name-input').focus();
    document.getElementById('name-input').style.borderColor = '#ff6b6b';
    setTimeout(() => document.getElementById('name-input').style.borderColor = '', 1000);
    return;
  }

  document.getElementById('screen-input').style.display = 'none';
  document.getElementById('loading').style.display = 'block';
  document.getElementById('gen-btn').disabled = true;

  setTimeout(() => {
    const result = calcResult(name);
    currentResult = result;
    renderResult(result);
    document.getElementById('loading').style.display = 'none';
    document.getElementById('screen-result').style.display = 'block';
  }, 1800);
}

function renderResult(r) {
  document.getElementById('r-input-name').textContent = r.name;
  document.getElementById('r-futatsumei').textContent = r.futatsumei;
  document.getElementById('r-epithet').textContent = '〜 ' + r.epithet + ' 〜';
  document.getElementById('r-type-badge').textContent = r.type.label;
  document.getElementById('r-type-badge').style.background =
    `linear-gradient(90deg, ${r.type.color[0]}, ${r.type.color[1]})`;
  document.getElementById('r-desc').textContent = r.type.desc(r.name, r.futatsumei);

  const list = document.getElementById('stats-list');
  list.innerHTML = r.stats.map(s => `
    <div class="stat-row">
      <div class="stat-label">${s.label}</div>
      <div class="stat-bar-wrap">
        <div class="stat-bar" id="bar-${s.key}"
          style="background:linear-gradient(90deg,${s.colors[0]},${s.colors[1]})"></div>
      </div>
      <div class="stat-val">${s.val}</div>
    </div>
  `).join('');

  // バーアニメーション
  setTimeout(() => {
    r.stats.forEach(s => {
      const el = document.getElementById('bar-' + s.key);
      if (el) el.style.width = (s.val / 999 * 100) + '%';
    });
  }, 100);
}

function retry() {
  document.getElementById('screen-result').style.display = 'none';
  document.getElementById('screen-input').style.display = 'block';
  document.getElementById('gen-btn').disabled = false;
  document.getElementById('name-input').value = '';
  document.getElementById('name-input').focus();
}

// ── シェア ───────────────────────────────────────────

function shareTwitter() {
  if (!currentResult) return;
  const r = currentResult;
  const text = `【二つ名ジェネレーター】\n「${r.name}」の二つ名は…\n\n⚔️「${r.futatsumei}」⚔️\n〜${r.epithet}〜\n\n${r.type.label}\n\n#二つ名ジェネレーター #異世界転生`;
  const url = location.href;
  window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}&url=${encodeURIComponent(url)}`, '_blank');
}

// ── 画像生成・保存 ────────────────────────────────────

function saveImage() {
  if (!currentResult) return;
  const r = currentResult;
  const canvas = document.getElementById('share-canvas');
  const ctx = canvas.getContext('2d');
  const W = 1200, H = 630;

  // 背景
  const bg = ctx.createLinearGradient(0, 0, W, H);
  bg.addColorStop(0, '#0d0020');
  bg.addColorStop(0.5, '#0a0a1e');
  bg.addColorStop(1, '#050510');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  // 装飾グロー
  const glow = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, 400);
  glow.addColorStop(0, 'rgba(155,109,255,0.18)');
  glow.addColorStop(1, 'transparent');
  ctx.fillStyle = glow;
  ctx.fillRect(0, 0, W, H);

  // 星
  ctx.fillStyle = 'rgba(255,255,255,0.7)';
  const starSeeds = [13,27,41,53,67,79,83,97,101,113,127,139,151,163,179];
  starSeeds.forEach((s, i) => {
    const sx = (s * 73 + i * 97) % W;
    const sy = (s * 53 + i * 61) % H;
    ctx.beginPath();
    ctx.arc(sx, sy, Math.random() < 0.3 ? 2 : 1, 0, Math.PI*2);
    ctx.fill();
  });

  // カード枠
  ctx.strokeStyle = 'rgba(155,109,255,0.4)';
  ctx.lineWidth = 2;
  roundRect(ctx, 60, 60, W-120, H-120, 24);
  ctx.stroke();

  // タイプバッジ
  ctx.fillStyle = r.type.color[0];
  ctx.font = 'bold 22px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText(r.type.label, W/2, 140);

  // 入力名
  ctx.fillStyle = 'rgba(255,255,255,0.55)';
  ctx.font = '24px sans-serif';
  ctx.fillText(r.name + ' の二つ名', W/2, 190);

  // 二つ名（メイン）
  const grad = ctx.createLinearGradient(W/2 - 300, 0, W/2 + 300, 0);
  grad.addColorStop(0, '#f0c060');
  grad.addColorStop(0.5, '#ffffff');
  grad.addColorStop(1, '#ffd700');
  ctx.fillStyle = grad;
  ctx.font = 'bold 72px sans-serif';
  ctx.shadowColor = 'rgba(240,192,96,0.5)';
  ctx.shadowBlur = 30;
  ctx.fillText(r.futatsumei, W/2, 290);
  ctx.shadowBlur = 0;

  // 副称号
  ctx.fillStyle = 'rgba(255,255,255,0.45)';
  ctx.font = '26px sans-serif';
  ctx.fillText('〜 ' + r.epithet + ' 〜', W/2, 345);

  // ステータスバー
  const statY = 395;
  const barW = 500;
  const barX = (W - barW) / 2 - 60;
  ctx.font = '18px sans-serif';
  r.stats.forEach((s, i) => {
    const y = statY + i * 32;
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.textAlign = 'left';
    ctx.fillText(s.label, barX, y + 13);
    ctx.fillStyle = 'rgba(255,255,255,0.08)';
    roundRect(ctx, barX + 70, y, barW, 16, 8);
    ctx.fill();
    const bGrad = ctx.createLinearGradient(barX+70, 0, barX+70+barW, 0);
    bGrad.addColorStop(0, s.colors[0]);
    bGrad.addColorStop(1, s.colors[1]);
    ctx.fillStyle = bGrad;
    roundRect(ctx, barX + 70, y, barW * (s.val/999), 16, 8);
    ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.8)';
    ctx.textAlign = 'right';
    ctx.fillText(s.val, barX + 70 + barW + 50, y + 13);
  });

  // サイト名
  ctx.fillStyle = 'rgba(255,255,255,0.2)';
  ctx.font = '18px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('二つ名ジェネレーター', W/2, H - 70);

  // ダウンロード
  const link = document.createElement('a');
  link.download = `futatsumei_${r.name}.png`;
  link.href = canvas.toDataURL('image/png');
  link.click();
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

// ── キーボード対応 ────────────────────────────────────
document.getElementById('name-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') generate();
});
